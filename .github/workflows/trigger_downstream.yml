# This is a basic workflow to help you get started with Actions

name: Trigger Build Events for Downstream Device Repos

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
    paths-ignore:
    # Exclude workflow updates
    - '.github/**'
    # Exclude .* files (etc. .gitignore)
    - '.*'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: Trigger Build Workflows for Newifi3
      uses: peter-evans/repository-dispatch@v1.1.1
      with:
        # A repo scoped GitHub Personal Access Token
        token: ${{ secrets.ACCOUNT_REPO_ACCESS_TOKEN }}
        # The full name of the repository to send the dispatch.
        repository: allankevinrichie/OpenWrt-Newifi3 # optional, default is ${{ github.repository }}
        # A custom webhook event name.
        event-type: lede-upstream-updated
        client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}' # optional, default is {}
